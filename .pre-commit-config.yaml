repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Prevent GitHub-hard-limit blobs.
      - id: check-added-large-files
        args: ["--maxkb=102400"] # 100MB

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint-fix

  - repo: local
    hooks:
      - id: prettier-markdown
        name: prettier (markdown tables)
        entry: npx prettier --write
        language: system
        types: [markdown]

      - id: forbid-org-files
        name: forbid org-mode files
        entry: bash -c 'echo "Do not commit .org files." >&2; exit 1'
        language: system
        files: \.org$
